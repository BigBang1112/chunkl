name: Publish NuGet Packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write # important for release description edit and asset upload
  packages: write
  id-token: write # required for nuget.org Trusted Publishing (OIDC)

jobs:
  nuget-login:
    name: NuGet Login (Trusted Publishing)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    outputs:
      api-key: ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
    steps:
      - name: NuGet login (Trusted Publishing OIDC)
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: BigBang1112

  publish:
    needs: nuget-login
    uses: BigBang1112/workflows/.github/workflows/publish-nuget.yml@main
    with:
      project-path: ChunkL/ChunkL.csproj
      test-path: ChunkL.Tests/ChunkL.Tests.csproj
      dotnet-version: |
        10.0.x
        9.0.x
        8.0.x
    secrets:
      NUGET_API_KEY: ${{ needs.nuget-login.outputs.api-key }}
